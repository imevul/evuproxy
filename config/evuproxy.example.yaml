# Example EvuProxy config — copy to /etc/evuproxy/config.yaml and edit.
# See README.md for field semantics.

wireguard:
  interface: evuproxy0
  listen_port: 51830
  private_key_file: /etc/evuproxy/wg-private.key
  address: 10.100.0.1/24

network:
  public_interface: eth0
  # When running Docker (or other bridges) on the same host, allow container egress to the internet:
  # forward_allow_docker_bridges: true
  # Optional extra IPv4 CIDRs (e.g. Docker networks on 10.x): forward_extra_local_cidrs: [ "10.89.0.0/24" ]

# Each target_ip must match a non-disabled peer tunnel_ip (host IPv4 only).
# Set disabled: true on a route to keep it in config but omit it from nftables until re-enabled.
# Start empty; add routes after you define peers.
forwarding:
  routes: []

geo:
  enabled: true
  mode: allow # allow = only listed countries may reach public ports; block = listed countries are denied
  set_name: geo_v4
  countries:
    - "no"
    - "se"
  zone_dir: /etc/evuproxy/geo-zones

# Host INPUT allows (SSH, web, EvuProxy UI). Remove or edit entries you do not want (e.g. 9080 if UI is loopback-only).
input_allows:
  - proto: tcp
    dport: "22"
    note: SSH
  - proto: tcp
    dport: "{ 80, 443 }"
    note: HTTP(S)
  - proto: tcp
    dport: "9080"
    note: EvuProxy admin UI (Docker)

peers: []
