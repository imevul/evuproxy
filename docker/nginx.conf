server {
    listen __UI_LISTEN__;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://__API_HOST__/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # After UI image rebuilds, force revalidation so browsers do not keep stale app.js / style.css
    # (dev stack uses no-store in docker/nginx.dev.conf).
    location /static/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, private, must-revalidate" always;
    }

    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache, private, must-revalidate" always;
    }

    location / {
        add_header Cache-Control "no-cache, private, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
